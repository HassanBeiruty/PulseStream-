name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Shared-core unit tests (normalizer, candles, hub, alerts, VWAP, OMS)
      - name: Install root dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      # Frontend: lint + production build (both data modes must compile)
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build (hub mode)
        working-directory: frontend
        run: npm run build

      - name: Build (direct mode — the Vercel deploy path)
        working-directory: frontend
        run: npm run build
        env:
          VITE_DATA_MODE: direct
